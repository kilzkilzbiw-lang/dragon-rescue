<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dragon Rescue</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="menu" class="screen">
<h1>🐉 DRAGON RESCUE</h1>

<button onclick="startGame('easy')">START EASY</button>
<button onclick="startGame('normal')">START NORMAL</button>
<button onclick="startGame('hard')">START ULTRA HARD</button>
<button onclick="openSettings()">SETTINGS</button>

</div>


<div id="settings" class="screen hidden">

<h2>SETTINGS</h2>

<label>
Music
<input type="checkbox" id="musicToggle" checked>
</label>

<br><br>

<button onclick="closeSettings()">BACK</button>

</div>


<div id="gameUI" class="hidden">

<span id="levelLabel">LEVEL 1</span>
<span id="hpLabel">HP 5</span>

</div>


<canvas id="gameCanvas" width="640" height="360"></canvas>


<div id="winScreen" class="screen hidden">

<h1>👑 QUEEN SAVED 👑</h1>

<button onclick="location.reload()">PLAY AGAIN</button>

</div>

<script src="game.js"></script>

</body>
</html>
